name: KKIndusties – Supabase & Repo Keep Alive

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 4 1 * *"

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated to v5
      - name: Checkout KKIndusties repository
        uses: actions/checkout@v5

      - name: Ping Supabase (KKIndusties)
        run: |
          echo "🔄 Pinging Supabase for KKIndusties..."
          curl -s -o /dev/null -w "Status: %{http_code}\n" \
          "${{ secrets.SUPABASE_URL }}/auth/v1/health"

      - name: Monthly Repo Update (KKIndusties)
        run: |
          echo "📝 Monthly keep-alive update for KKIndusties" >> KKINDUSTIES_KEEPALIVE.md
          date >> KKINDUSTIES_KEEPALIVE.md

          git config user.name "kkindusties-bot"
          git config user.email "kkindusties-bot@users.noreply.github.com"

          git add KKINDUSTIES_KEEPALIVE.md
          git commit -m "chore(kkindusties): monthly keep-alive commit" || echo "Nothing to commit"
          git push origin HEAD
